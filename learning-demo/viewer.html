<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer — Desktop / Tablet</title>
  <style>
    :root {
      --toolbar-h: 56px;
      --navbar-h: 52px;
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --text: #f0f0f0;
      --muted: #9a9a9a;
      --accent: #019de5;
      --border: #3a3a3a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

    .toolbar {
      height: var(--toolbar-h);
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      direction: ltr;
    }
    .toolbar h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
    .toolbar .spacer { flex: 1; }
    .toolbar .size-readout { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    .seg {
      display: inline-flex; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .seg button {
      appearance: none; border: 0; background: transparent; color: var(--text);
      padding: 8px 16px; font: inherit; font-size: 13px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background 0.15s ease;
    }
    .seg button:hover { background: #333; }
    .seg button.active { background: var(--accent); color: #fff; }
    .seg button .ico { width: 16px; height: 16px; display: inline-block; }

    .navbar {
      height: var(--navbar-h);
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px;
      background: #232323;
      border-bottom: 1px solid var(--border);
      direction: ltr;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .navbar .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-right: 8px; flex-shrink: 0; }
    .nav-btn {
      appearance: none; border: 1px solid var(--border); background: #1a1a1a; color: var(--text);
      padding: 6px 10px; font: inherit; font-size: 12px; cursor: pointer; border-radius: 6px;
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .nav-btn:hover { background: #333; }
    .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nav-btn .nb-num { font-weight: 700; opacity: 0.85; font-variant-numeric: tabular-nums; }
    .nav-btn .nb-name { opacity: 0.85; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .stage {
      position: absolute; top: calc(var(--toolbar-h) + var(--navbar-h)); left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: auto;
      padding: 24px;
    }

    /* ─── Responsive viewer chrome ───────────────────────────
       Narrow viewports: shrink button labels, hide secondary
       text so the device toggle still fits. The navbar already
       scrolls horizontally via overflow-x: auto. */
    @media (max-width: 900px) {
      .toolbar { gap: 10px; padding: 0 12px; }
      .toolbar h1 { display: none; }
      .seg button .ico { display: none; }
      .seg button span { display: none; }
    }
    @media (max-width: 600px) {
      :root { --toolbar-h: 48px; --navbar-h: 48px; }
      .toolbar .size-readout { font-size: 11px; }
      .seg button { padding: 6px 10px; font-size: 12px; }
      .nav-btn { padding: 5px 8px; font-size: 11px; }
      .nav-btn .nb-name { display: none; }
      .navbar .nav-label { display: none; }
      .stage { padding: 12px; }
    }

    /* Outer "shell" sized to the SCALED visual dimensions. This is what the
       stage flex uses for centering/scrolling decisions. */
    .device-shell {
      position: relative;
      transition: width 0.2s ease, height 0.2s ease;
      flex: 0 0 auto;
    }
    /* Inner scaling layer — sized to the device's native pixel resolution,
       then transformed down to fit. transform-origin: top left so visual
       overlaps the shell exactly. */
    .device-scale {
      position: absolute; top: 0; left: 0;
      transform-origin: top left;
      transition: transform 0.2s ease;
    }
    /* Inner frame at the device's true pixel size */
    .device-frame {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      transition: width 0.2s ease, height 0.2s ease;
    }
    .device-frame iframe {
      width: 100%; height: 100%;
      border: 0; display: block; background: #fff;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <h1>Lomda Viewer</h1>

    <div class="seg" role="group" aria-label="Device">
      <button type="button" data-device="desktop" class="active" aria-pressed="true">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Desktop
        <span style="color:rgba(255,255,255,0.6); font-size:11px;">1920×1080</span>
      </button>
      <button type="button" data-device="tablet" aria-pressed="false">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 17h.01"/></svg>
        Tablet
        <span style="color:rgba(255,255,255,0.6); font-size:11px;">1024×768</span>
      </button>
      <button type="button" data-device="tablet-portrait" aria-pressed="false">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M12 17h.01"/></svg>
        Tablet · Portrait
        <span style="color:rgba(255,255,255,0.6); font-size:11px;">768×1024</span>
      </button>
    </div>

    <div class="spacer"></div>
    <div class="size-readout" id="size-readout">— × —  ·  ×—</div>
  </div>

  <nav class="navbar" id="navbar" aria-label="Jump to screen">
    <span class="nav-label">Screens</span>
    <!-- Buttons are injected by JS from SCREENS[] -->
  </nav>

  <div class="stage" id="stage">
    <div class="device-shell" id="device-shell">
      <div class="device-scale" id="device-scale">
        <div class="device-frame" id="device-frame">
          <iframe id="device-iframe" src="index.html" title="App preview"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEVICES = {
      desktop:         { w: 1920, h: 1080, label: 'Desktop' },
      tablet:          { w: 1024, h:  768, label: 'Tablet · Landscape' },
      'tablet-portrait': { w:  768, h: 1024, label: 'Tablet · Portrait'  },
    };

    // Screen index → human label. Keep in sync with index.html screen comments.
    const SCREENS = [
      { n: 0,  name: 'Character Selection' },
      { n: 1,  name: 'SingleChoice Q' },
      { n: 2,  name: 'FlipCards Reveal' },
      { n: 3,  name: 'DragAndDrop Q' },
      { n: 4,  name: 'TwoOption Selection' },
      { n: 5,  name: 'Video Path' },
      { n: 6,  name: 'FlipCards Path' },
      { n: 7,  name: 'Transition' },
      { n: 8,  name: 'Dropdown Q' },
      { n: 9,  name: 'SingleChoice Image' },
      { n: 10, name: 'Transition · Standard' },
      { n: 11, name: 'DragAndDrop · Standard' },
    ];

    const stage      = document.getElementById('stage');
    const shellEl    = document.getElementById('device-shell');
    const scaleEl    = document.getElementById('device-scale');
    const frameEl    = document.getElementById('device-frame');
    const iframeEl   = document.getElementById('device-iframe');
    const readoutEl  = document.getElementById('size-readout');
    const navbar     = document.getElementById('navbar');
    const devBtns    = document.querySelectorAll('.seg button');

    let current     = 'desktop';
    let activeScreen = 0;
    let navBtns     = [];

    /* ─── Device sizing ─────────────────────────────────────── */
    function applyDevice() {
      const d = DEVICES[current];
      frameEl.style.width  = d.w + 'px';
      frameEl.style.height = d.h + 'px';
      fitScale();
    }

    function fitScale() {
      const d = DEVICES[current];
      const padding = 48; // matches .stage padding * 2
      const availW = stage.clientWidth  - padding;
      const availH = stage.clientHeight - padding;
      const scale  = Math.min(1, availW / d.w, availH / d.h);
      // Shell carries the SCALED visual dimensions for layout/flex centering.
      shellEl.style.width  = (d.w * scale) + 'px';
      shellEl.style.height = (d.h * scale) + 'px';
      // Inner scale layer is positioned absolutely and transformed.
      scaleEl.style.width  = d.w + 'px';
      scaleEl.style.height = d.h + 'px';
      scaleEl.style.transform = `scale(${scale})`;
      readoutEl.textContent =
        `${d.w} × ${d.h}  ·  ×${scale.toFixed(2)}`;
    }

    devBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        current = btn.dataset.device;
        devBtns.forEach(b => {
          const on = b === btn;
          b.classList.toggle('active', on);
          b.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
        applyDevice();
      });
    });

    window.addEventListener('resize', fitScale);
    applyDevice();

    /* ─── Screen jumper ─────────────────────────────────────── */
    function buildNav() {
      SCREENS.forEach(s => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'nav-btn';
        b.dataset.screen = s.n;
        b.innerHTML = `<span class="nb-num">S${s.n}</span><span class="nb-name">${s.name}</span>`;
        b.addEventListener('click', () => jumpTo(s.n));
        navbar.appendChild(b);
        navBtns.push(b);
      });
      setActive(0);
    }

    function setActive(n) {
      activeScreen = n;
      navBtns.forEach(b => {
        b.classList.toggle('active', Number(b.dataset.screen) === n);
      });
    }

    function jumpTo(n) {
      const win = iframeEl.contentWindow;
      if (!win || typeof win.goTo !== 'function') return;
      win.goTo(n);
      setActive(n);
    }

    // When iframe (re)loads, sync active highlight to whatever screen is showing
    // and hook into the inner goTo so external advances also update the nav.
    iframeEl.addEventListener('load', () => {
      const win = iframeEl.contentWindow;
      if (!win) return;

      // Reflect inner state on load
      const initial = typeof win.currentScreen === 'number' ? win.currentScreen : 0;
      setActive(initial);

      // Wrap inner goTo so user-driven advances (next/back/keyboard) update nav.
      if (typeof win.goTo === 'function' && !win.__viewerWrapped) {
        const origGoTo = win.goTo;
        win.goTo = function(n) {
          origGoTo.call(this, n);
          setActive(typeof win.currentScreen === 'number' ? win.currentScreen : n);
        };
        win.__viewerWrapped = true;
      }
    });

    buildNav();
  </script>

</body>
</html>
